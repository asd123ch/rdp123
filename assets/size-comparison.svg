<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14">
  <!-- Installed size comparison, linear scale (420 px = 993 MB). -->
  <g fill="#8b949e">
    <text x="250" y="22" text-anchor="end">Remote Desktop Manager</text>
    <text x="250" y="39" text-anchor="end" font-size="11">(Devolutions)</text>
    <rect x="260" y="16" width="420" height="14" rx="3" fill="#8b949e" opacity="0.55"/>
    <text x="688" y="28">993 MB</text>

    <text x="250" y="82" text-anchor="end">Microsoft Windows App</text>
    <rect x="260" y="70" width="97" height="14" rx="3" fill="#8b949e" opacity="0.55"/>
    <text x="365" y="82">228 MB</text>

    <text x="250" y="136" text-anchor="end" font-weight="600" fill="#2f81f7">RDP123</text>
    <rect x="260" y="124" width="4" height="14" rx="2" fill="#2f81f7"/>
    <text x="272" y="136" font-weight="600" fill="#2f81f7">8 MB</text>
  </g>
</svg>
